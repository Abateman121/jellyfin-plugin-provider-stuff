name: Build and Release

on:
  push:
    tags:
      - 'v*'          # triggers on any tag starting with v (v1.3.0, v1.3.0.0, etc)
  release:
    types: [published] # also triggers when a release is published via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.ProviderStuff/Jellyfin.Plugin.ProviderStuff.csproj

      - name: Build and publish
        run: |
          dotnet publish Jellyfin.Plugin.ProviderStuff/Jellyfin.Plugin.ProviderStuff.csproj \
            -c Release \
            -o ./publish \
            /p:AssemblyVersion=${{ steps.version.outputs.VERSION }} \
            /p:FileVersion=${{ steps.version.outputs.VERSION }} \
            /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Package zip
        run: |
          cd publish
          zip ../providerstuff-${{ steps.version.outputs.VERSION }}.zip Jellyfin.Plugin.ProviderStuff.dll
          cd ..

      - name: Compute checksum
        id: checksum
        run: |
          MD5=$(md5sum providerstuff-${{ steps.version.outputs.VERSION }}.zip | awk '{print $1}')
          echo "MD5=$MD5" >> $GITHUB_OUTPUT

      - name: Update manifest.json checksum and timestamp
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          MD5=${{ steps.checksum.outputs.MD5 }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Update checksum and timestamp in the versions array for this version
          python3 -c "
          import json, sys
          with open('manifest.json') as f:
              data = json.load(f)
          for plugin in data:
              for v in plugin.get('versions', []):
                  if v['version'] == '$VERSION':
                      v['checksum'] = '$MD5'
                      v['timestamp'] = '$TIMESTAMP'
          with open('manifest.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('manifest.json updated')
          "

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest checksum for v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push skipped"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ProviderStuff v${{ steps.version.outputs.VERSION }} (Jellyfin 10.11)"
          body: |
            ## Jellyfin 10.11 compatible build

            **Fix:** `ILibraryManager.GetItemList()` was removed in Jellyfin 10.10/10.11.
            Replaced with `GetItemListResult().Items` in both call sites.
            All other functionality is identical to upstream v1.2.0.0.

            ### Install via Plugin Repository
            Add this URL in Jellyfin → Dashboard → Plugins → Repositories:
            ```
            https://raw.githubusercontent.com/Abateman121/jellyfin-plugin-provider-stuff/main/manifest.json
            ```

            ### Manual Install
            Download the zip, extract `Jellyfin.Plugin.ProviderStuff.dll` and place it in:
            `/config/plugins/ProviderStuff_${{ steps.version.outputs.VERSION }}/`
          files: providerstuff-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
